pipeline:
  name: ci-build-pipeline
  identifier: cibuildpipeline
  projectIdentifier: Assessment
  orgIdentifier: default
  tags: {}
  stages:
    - stage:
        name: build
        identifier: build
        description: ""
        type: CI
        spec:
          cloneCodebase: true
          caching:
            enabled: true
            override: true
          buildIntelligence:
            enabled: true
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec:
              imageSpec:
                imageName: ubuntu-latest
          execution:
            steps:
              - step:
                  type: BuildAndPushDockerRegistry
                  name: BuildAndPushDockerRegistry_1
                  identifier: BuildAndPushDockerRegistry_1
                  spec:
                    connectorRef: docker_hub
                    repo: ashutosham2002/nodejsapp
                    tags:
                      - latest
                    dockerfile: ./Dockerfile
  properties:
    ci:
      codebase:
        connectorRef: Ashutosh
        build: <+input>
