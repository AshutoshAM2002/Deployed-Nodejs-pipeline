service:
  name: deploy
  identifier: deploy
  serviceDefinition:
    type: Kubernetes
    spec:
      artifacts:
        primary:
          primaryArtifactRef: <+input>
          sources:
            - spec:
                connectorRef: docker_hub
                imagePath: ashutosham2002/nodejsapp
                tag: <+input>.selectOneFrom(latest)
                digest: ""
              identifier: dockerhub
              type: DockerRegistry
      manifests:
        - manifest:
            identifier: k8s
            type: K8sManifest
            spec:
              store:
                type: Github
                spec:
                  connectorRef: Ashutosh
                  gitFetchType: Branch
                  paths:
                    - k8s
                  branch: main
              skipResourceVersioning: false
              enableDeclarativeRollback: false
  gitOpsEnabled: false
  orgIdentifier: default
  projectIdentifier: Assessment
